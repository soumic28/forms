<!doctype html>
<html>
  <head>
    <title>Bareilly Kitab Utsav - Offline Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      :root {
        --purple: #673ab7;
        --accent: #f1edff;
        --border: #dcdcdc;
        --text: #202124;
        --success: #0f9d58;
        --pending: #f4b400;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f5f5f5;
        color: var(--text);
        line-height: 1.5;
      }
      .page {
        max-width: 720px;
        margin: 24px auto 60px;
        padding: 0 18px;
      }
      .form-card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        margin-bottom: 16px;
        overflow: hidden;
      }
      .form-header {
        border-top: 8px solid var(--purple);
        padding: 24px 20px;
      }
      .form-header h1 {
        margin: 0 0 4px;
        font-size: 24px;
      }
      .form-header .sub {
        margin: 0 0 8px;
        color: #5f6368;
        font-size: 14px;
      }
      .server-settings {
        background: #eee;
        padding: 10px 20px;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border);
      }
      .server-settings input {
        flex: 1;
        font-size: 12px;
        padding: 4px 8px;
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      form {
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .question {
        border-top: 1px solid var(--border);
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .question:first-of-type {
        border-top: none;
      }
      .q-label {
        font-weight: 500;
        margin: 0;
      }
      input[type="text"],
      input[type="tel"],
      input[type="email"],
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 14px;
        transition: border-color 0.2s;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--purple);
      }
      .options label {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        transition: background 0.2s;
      }
      .options label:hover {
        background: var(--accent);
      }
      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 8px;
      }
      button.primary {
        background: var(--purple);
        color: #fff;
        border: none;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 6px;
        margin-top: 10px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }
      button.primary:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #entries .entry {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        margin-bottom: 12px;
        position: relative;
      }
      .sync-badge {
        position: absolute;
        top: 16px;
        right: 16px;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 10px;
        text-transform: uppercase;
        font-weight: bold;
      }
      .sync-badge.synced {
        background: #e6f4ea;
        color: var(--success);
      }
      .sync-badge.pending {
        background: #fef7e0;
        color: var(--pending);
      }
      .sync-badge.remote {
        background: #e8f0fe;
        color: #1a73e8;
      }

      #entries .meta {
        color: #5f6368;
        font-size: 12px;
        margin-top: 8px;
        border-top: 1px solid #f0f0f0;
        padding-top: 8px;
      }
      .buttons button {
        flex: 1;
        min-width: 120px;
      }
      .debug-panel {
        margin-top: 30px;
        background: #333;
        color: #00ff00;
        padding: 15px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 11px;
        display: none;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
      }
      .status-ok {
        background: var(--success);
      }
      .status-err {
        background: #ea4335;
      }

      .loader {
        width: 16px;
        height: 16px;
        border: 2px solid #fff;
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        animation: rotation 1s linear infinite;
      }
      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="form-card">
        <div class="server-settings">
          <label>Server URL:</label>
          <input
            type="text"
            id="serverUrl"
            value="https://forms-five-hazel.vercel.app"
            placeholder="e.g. http://192.168.1.10:3000"
          />
        </div>
        <div class="form-header">
          <h1>Bareilly Kitab Utsav - 01</h1>
          <p class="sub">April 03-07, 2026 | Offline Entry Form</p>
        </div>

        <form id="myForm">
          <!-- NAME -->
          <div class="question">
            <label class="q-label" for="name">Name</label>
            <input type="text" id="name" required />
          </div>

          <!-- NUMBER -->
          <div class="question">
            <label for="number">Number</label>
            <input type="tel" id="number" required />
          </div>

          <!-- EMAIL -->
          <div class="question">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>

          <!-- AGE GROUP -->
          <div class="question">
            <p class="q-label">Age Group</p>
            <div class="options">
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="0-10"
                  required
                />0-10</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="11-15"
                />11-15</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="16-18"
                />16-18</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="19-22"
                />19-22</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="23-25"
                />23-25</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="26-28"
                />26-28</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="29-31"
                />29-31</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="32-35"
                />32-35</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="35-40"
                />35-40</label
              >
              <label
                ><input type="radio" name="ageGroup" value="40+" />40+</label
              >
            </div>
          </div>

          <!-- SOURCE -->
          <div class="question">
            <p class="q-label">From where you know about the event?</p>
            <div class="options">
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Invitation Card"
                  required
                />Invitation Card</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Poster"
                />Poster</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Instagram"
                />Instagram</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Facebook"
                />Facebook</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Friends/Family"
                />Friends/Family</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Newspaper"
                />Newspaper</label
              >
              <label
                ><input type="radio" name="source" value="Other" />Other</label
              >
            </div>
          </div>

          <!-- PIN CODE -->
          <div class="question">
            <label for="pinCode">Location Pin Code</label>
            <input
              type="text"
              id="pinCode"
              placeholder="e.g. 243001 or Area Name"
              required
            />
          </div>

          <!-- FEEDBACK -->
          <div class="question">
            <label for="feedback">Suggestion / Feedback</label>
            <textarea id="feedback"></textarea>
          </div>

          <button class="primary" type="submit" id="submitBtn">
            <span>Save Offline</span>
          </button>
        </form>
      </div>

      <div class="buttons">
        <button id="showBtn">Show Local Entries</button>
        <button
          id="fetchBtn"
          style="background: var(--accent); border-color: var(--purple)"
        >
          Fetch from Server
        </button>
        <button id="copyBtn">Copy All Data</button>
        <button id="testBtn">Test Connection</button>
        <button id="debugBtn" style="background: #eee">Debug Logs</button>
        <button id="exportJsonBtn">Export JSON</button>
        <button id="exportCsvBtn">Export CSV</button>
      </div>

      <div id="entries"></div>

      <div id="debugPanel" class="debug-panel">
        <strong>Mobile Diagnostics:</strong>
        <div id="debugContent"></div>
      </div>
    </div>

    <script>
      let db;
      const DB_NAME = "OfflineFormDB";
      const DB_STORE = "entries";

      const FIELD_ORDER = [
        "name",
        "number",
        "email",
        "ageGroup",
        "source",
        "pinCode",
        "feedback",
        "time",
      ];

      const FIELD_LABELS = {
        name: "Name",
        number: "Phone Number",
        email: "Email",
        ageGroup: "Age Group",
        source: "Source",
        pinCode: "Pin Code",
        feedback: "Feedback",
        time: "Time",
      };

      // Load saved server URL
      const savedUrl = localStorage.getItem("offline_form_server_url");
      if (savedUrl) document.getElementById("serverUrl").value = savedUrl;

      function getServerUrl() {
        const url = document.getElementById("serverUrl").value.trim();
        localStorage.setItem("offline_form_server_url", url);
        return url.endsWith("/") ? url.slice(0, -1) : url;
      }

      function log(msg, type = "info") {
        const panel = document.getElementById("debugPanel");
        const content = document.getElementById("debugContent");
        const time = new Date().toLocaleTimeString();
        content.innerHTML = `[${time}] ${msg}<br>` + content.innerHTML;
        console.log(`[FORM DEBUG] ${msg}`);
      }

      const request = indexedDB.open(DB_NAME, 2);

      request.onerror = function (event) {
        log("IndexedDB failed: " + event.target.error, "err");
        alert(
          "CRITICAL: Local database is blocked. If you are on iPhone, try opening this file in Chrome instead of Safari, or disable 'Incognito' mode.",
        );
      };

      request.onupgradeneeded = function (event) {
        log("Database upgrade/init started...");
        db = event.target.result;
        const oldVersion = event.oldVersion;
        let store;
        if (oldVersion < 1) {
          store = db.createObjectStore(DB_STORE, {
            keyPath: "id",
            autoIncrement: true,
          });
        } else {
          store = event.target.transaction.objectStore(DB_STORE);
        }
        if (!store.indexNames.contains("synced")) {
          store.createIndex("synced", "synced", { unique: false });
        }
      };

      request.onsuccess = function (event) {
        db = event.target.result;
        if (navigator.onLine) syncToServer();
      };

      document
        .getElementById("myForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const btn = document.getElementById("submitBtn");
          const btnText = btn.querySelector("span");

          // Show loading state
          btn.disabled = true;
          btnText.innerHTML = 'Saving... <div class="loader"></div>';

          const entry = {
            name: document.getElementById("name").value.trim(),
            number: document.getElementById("number").value.trim(),
            email: document.getElementById("email").value.trim(),
            ageGroup: getCheckedValue("ageGroup"),
            source: getCheckedValue("source"),
            pinCode: document.getElementById("pinCode").value.trim(),
            feedback: document.getElementById("feedback").value.trim(),
            time: new Date().toISOString(),
            synced: false,
          };

          const tx = db.transaction([DB_STORE], "readwrite");
          const store = tx.objectStore(DB_STORE);

          tx.onerror = (e) => {
            log("Transaction Error: " + e.target.error);
            alert("Storage full or blocked!");
            finishSubmit();
          };

          const addReq = store.add(entry);

          addReq.onsuccess = (e) => {
            const id = e.target.result;
            entry.id = id;
            log("Saved locally to ID: " + id);

            // Reset Form
            document.getElementById("myForm").reset();

            // Proactive Sync
            if (navigator.onLine) {
              log("Online detected. Syncing...");
              sendEntry(entry)
                .then(() => {
                  log("Sync successful!");
                })
                .catch((err) => {
                  log("Immediate sync failed (expected if offline or CORS)");
                })
                .finally(() => {
                  finishSubmit();
                });
            } else {
              log("Offline mode. Stored locally.");
              alert("Saved Offline! Will sync when online.");
              finishSubmit();
            }
          };

          addReq.onerror = (e) => {
            log("Add Request Error: " + e.target.error);
            alert("Could not save. Check browser settings.");
            finishSubmit();
          };

          function finishSubmit() {
            btn.disabled = false;
            btnText.innerHTML = "Save Offline";
            showLocalEntries();
          }
        });

      document
        .getElementById("showBtn")
        .addEventListener("click", showLocalEntries);

      function showLocalEntries() {
        const entriesDiv = document.getElementById("entries");
        entriesDiv.innerHTML = "<h3>Local Entries (This Device)</h3>";

        const tx = db.transaction([DB_STORE], "readonly");
        const store = tx.objectStore(DB_STORE);

        store.openCursor(null, "prev").onsuccess = function (event) {
          const cursor = event.target.result;
          if (cursor) {
            entriesDiv.innerHTML += renderEntry(cursor.value);
            cursor.continue();
          }
        };
      }

      document
        .getElementById("fetchBtn")
        .addEventListener("click", function () {
          const entriesDiv = document.getElementById("entries");
          const fetchBtn = document.getElementById("fetchBtn");
          fetchBtn.disabled = true;
          fetchBtn.innerText = "Fetching...";

          fetch(`${getServerUrl()}/entries`)
            .then((res) => res.json())
            .then((data) => {
              entriesDiv.innerHTML = `<h3>Server Entries (Global)</h3>`;
              if (data.length === 0)
                entriesDiv.innerHTML += "<p>No entries found on server.</p>";
              data.forEach((item) => {
                entriesDiv.innerHTML += renderEntry({
                  ...item,
                  ageGroup: item.age_group,
                  pinCode: item.pin_code,
                  time: item.submitted_at || item.created_at,
                  remote: true,
                });
              });
            })
            .catch((err) => {
              alert("Error fetching from server. Check URL or connection.");
              console.error(err);
            })
            .finally(() => {
              fetchBtn.disabled = false;
              fetchBtn.innerText = "Fetch from Server";
            });
        });

      document.getElementById("copyBtn").addEventListener("click", function () {
        exportAllData().then((data) => {
          if (data.length === 0) {
            alert("No data to copy");
            return;
          }
          const text = JSON.stringify(data, null, 2);
          navigator.clipboard
            .writeText(text)
            .then(() => {
              alert("All entries copied to clipboard!");
            })
            .catch((err) => {
              console.error("Clipboard error", err);
              // Fallback for some mobile browsers
              const textarea = document.createElement("textarea");
              textarea.value = text;
              document.body.appendChild(textarea);
              textarea.select();
              document.execCommand("copy");
              document.body.removeChild(textarea);
              alert("All entries copied to clipboard!");
            });
        });
      });

      document.getElementById("testBtn").addEventListener("click", function () {
        const btn = document.getElementById("testBtn");
        btn.disabled = true;
        btn.innerText = "Testing...";
        log("Testing connection to " + getServerUrl() + "/...");

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        fetch(getServerUrl() + "/", {
          mode: "no-cors",
          signal: controller.signal,
        })
          .then(() => {
            log("Server is reachable!");
            alert("Success! Your phone can talk to the server.");
          })
          .catch((err) => {
            log("Connection failed: " + err.message);
            alert(
              "Failed! Cannot reach server. Check URL, IP, or if Server is running.",
            );
          })
          .finally(() => {
            clearTimeout(timeoutId);
            btn.disabled = false;
            btn.innerText = "Test Connection";
          });
      });

      document
        .getElementById("debugBtn")
        .addEventListener("click", function () {
          const panel = document.getElementById("debugPanel");
          panel.style.display =
            panel.style.display === "block" ? "none" : "block";
        });

      document
        .getElementById("exportJsonBtn")
        .addEventListener("click", function () {
          exportAllData().then((data) => {
            const blob = new Blob([JSON.stringify(data, null, 2)], {
              type: "application/json",
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "offline-data.json";
            a.click();
          });
        });

      document
        .getElementById("exportCsvBtn")
        .addEventListener("click", function () {
          exportAllData().then((data) => {
            if (data.length === 0) {
              alert("No data found");
              return;
            }
            const header =
              FIELD_ORDER.map((k) => `"${FIELD_LABELS[k]}"`).join(",") + "\n";
            const rows = data
              .map((obj) =>
                FIELD_ORDER.map(
                  (k) => `"${String(obj[k] || "").replace(/"/g, '""')}"`,
                ).join(","),
              )
              .join("\n");
            const blob = new Blob([header + rows], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "offline-data.csv";
            a.click();
          });
        });

      function exportAllData() {
        return new Promise((resolve) => {
          const tx = db.transaction([DB_STORE], "readonly");
          const store = tx.objectStore(DB_STORE);
          const all = [];
          store.openCursor().onsuccess = function (e) {
            const cursor = e.target.result;
            if (cursor) {
              all.push(cursor.value);
              cursor.continue();
            } else resolve(all);
          };
        });
      }

      function getCheckedValue(name) {
        const node = document.querySelector(`input[name="${name}"]:checked`);
        return node ? node.value : "";
      }

      window.addEventListener("online", syncToServer);

      function syncToServer() {
        const tx = db.transaction([DB_STORE], "readonly");
        const index = tx.objectStore(DB_STORE).index("synced");
        const pending = [];

        index.openCursor(IDBKeyRange.only(false)).onsuccess = function (e) {
          const cursor = e.target.result;
          if (cursor) {
            pending.push(cursor.value);
            cursor.continue();
          } else {
            pending.forEach(sendEntry);
          }
        };
      }

      function sendEntry(entry) {
        return fetch(`${getServerUrl()}/submit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(entry),
        })
          .then((res) => {
            if (res.ok) markSynced(entry.id);
            return res;
          })
          .catch((err) => {
            console.warn("Sync failed", err);
            throw err;
          });
      }

      function markSynced(id) {
        const tx = db.transaction([DB_STORE], "readwrite");
        const store = tx.objectStore(DB_STORE);
        const req = store.get(id);
        req.onsuccess = function () {
          const record = req.result;
          if (record) {
            record.synced = true;
            store.put(record);
          }
        };
      }

      function renderEntry(entry) {
        let badge = "";
        if (entry.remote) {
          badge = '<span class="sync-badge remote">Cloud</span>';
        } else {
          badge = entry.synced
            ? '<span class="sync-badge synced">Synced</span>'
            : '<span class="sync-badge pending">Pending</span>';
        }

        return `
        <div class="entry">
          ${badge}
          <strong>${entry.name}</strong><br>
          <small>${entry.number} | ${entry.email}</small><br>
          <div style="font-size: 13px; margin-top: 5px;">
            <b>Age:</b> ${entry.ageGroup} | <b>Source:</b> ${entry.source} | <b>Pin:</b> ${entry.pinCode}
          </div>
          ${entry.feedback ? `<div style="font-size: 13px; font-style: italic; color: #666; margin-top: 4px;">"${entry.feedback}"</div>` : ""}
          <div class="meta">${new Date(entry.time).toLocaleString()}</div>
        </div>`;
      }
    </script>
  </body>
</html>
