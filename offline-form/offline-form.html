<!doctype html>
<html>
  <head>
    <title>Patna Kitab Utsav - Offline Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      :root {
        --purple: #673ab7;
        --accent: #f1edff;
        --border: #dcdcdc;
        --text: #202124;
        --success: #0f9d58;
        --pending: #f4b400;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f5f5f5;
        color: var(--text);
        line-height: 1.5;
      }
      .page {
        max-width: 720px;
        margin: 24px auto 60px;
        padding: 0 18px;
      }
      .form-card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        margin-bottom: 16px;
        overflow: hidden;
      }
      .form-header {
        border-top: 8px solid var(--purple);
        padding: 24px 20px;
      }
      .form-header h1 {
        margin: 0 0 4px;
        font-size: 24px;
      }
      .form-header .sub {
        margin: 0 0 8px;
        color: #5f6368;
        font-size: 14px;
      }
      .server-settings {
        background: #eee;
        padding: 10px 20px;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border);
      }
      .server-settings input {
        flex: 1;
        font-size: 12px;
        padding: 4px 8px;
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      form {
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .question {
        border-top: 1px solid var(--border);
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .question:first-of-type {
        border-top: none;
      }
      .q-label {
        font-weight: 500;
        margin: 0;
      }
      input[type="text"],
      input[type="tel"],
      input[type="email"],
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 14px;
        transition: border-color 0.2s;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--purple);
      }
      .options label {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        transition: background 0.2s;
      }
      .options label:hover {
        background: var(--accent);
      }
      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 8px;
      }
      button.primary {
        background: var(--purple);
        color: #fff;
        border: none;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 6px;
        margin-top: 10px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }
      button.primary:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #entries .entry {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        margin-bottom: 12px;
        position: relative;
      }
      .sync-badge {
        position: absolute;
        top: 16px;
        right: 16px;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 10px;
        text-transform: uppercase;
        font-weight: bold;
      }
      .sync-badge.synced {
        background: #e6f4ea;
        color: var(--success);
      }
      .sync-badge.pending {
        background: #fef7e0;
        color: var(--pending);
      }
      .sync-badge.remote {
        background: #e8f0fe;
        color: #1a73e8;
      }

      #entries .meta {
        color: #5f6368;
        font-size: 12px;
        margin-top: 8px;
        border-top: 1px solid #f0f0f0;
        padding-top: 8px;
      }
      .buttons button {
        flex: 1;
        min-width: 120px;
      }
      .debug-panel {
        margin-top: 30px;
        background: #333;
        color: #00ff00;
        padding: 15px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 11px;
        display: none;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
      }
      .status-ok {
        background: var(--success);
      }
      .status-err {
        background: #ea4335;
      }

      .loader {
        width: 16px;
        height: 16px;
        border: 2px solid #fff;
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        animation: rotation 1s linear infinite;
      }
      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="form-card">
        <div class="server-settings">
          <label>Server URL:</label>
          <input
            type="text"
            id="serverUrl"
            value="https://forms-five-hazel.vercel.app"
            placeholder="e.g. http://192.168.1.10:3000"
          />
        </div>
        <div class="form-header">
          <h1>Bareilly Kitab Utsav - 01</h1>
          <p class="sub">April 03-07, 2026 | Offline Entry Form</p>
        </div>

        <form id="myForm">
          <!-- NAME -->
          <div class="question">
            <label class="q-label" for="name">Name</label>
            <input type="text" id="name" required />
          </div>

          <!-- NUMBER -->
          <div class="question">
            <label for="number">Number</label>
            <input type="tel" id="number" required />
          </div>

          <!-- EMAIL -->
          <div class="question">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>

          <!-- AGE GROUP -->
          <div class="question">
            <p class="q-label">Age Group</p>
            <div class="options">
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="0-10"
                  required
                />0-10</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="11-15"
                />11-15</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="16-18"
                />16-18</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="19-22"
                />19-22</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="23-25"
                />23-25</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="26-28"
                />26-28</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="29-31"
                />29-31</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="32-35"
                />32-35</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="35-40"
                />35-40</label
              >
              <label
                ><input type="radio" name="ageGroup" value="40+" />40+</label
              >
            </div>
          </div>

          <!-- SOURCE -->
          <div class="question">
            <p class="q-label">From where you know about the event?</p>
            <div class="options">
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Invitation Card"
                  required
                />Invitation Card</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Poster"
                />Poster</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Instagram"
                />Instagram</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Facebook"
                />Facebook</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Friends/Family"
                />Friends/Family</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Newspaper"
                />Newspaper</label
              >
              <label
                ><input type="radio" name="source" value="Other" />Other</label
              >
            </div>
          </div>

          <!-- PIN CODE -->
          <div class="question">
            <label for="pinCode">Location Pin Code</label>
            <input
              type="text"
              id="pinCode"
              placeholder="e.g. 243001 or Area Name"
              required
            />
          </div>

          <!-- FEEDBACK -->
          <div class="question">
            <label for="feedback">Suggestion / Feedback</label>
            <textarea id="feedback"></textarea>
          </div>

          <button class="primary" type="submit" id="submitBtn">
            <span>Save Offline</span>
          </button>
        </form>
      </div>

      <div class="buttons">
        <button id="showBtn">Show Local Entries</button>
        <button
          id="fetchBtn"
          style="background: var(--accent); border-color: var(--purple)"
        >
          Fetch from Server
        </button>
        <button id="copyBtn">Copy All Data</button>
        <button id="testBtn">Test Connection</button>
        <button id="debugBtn" style="background: #eee">Debug Logs</button>
        <button id="exportJsonBtn">Export JSON</button>
        <button id="exportCsvBtn">Export CSV</button>
      </div>

      <div id="entries"></div>

      <div id="debugPanel" class="debug-panel">
        <strong>Mobile Diagnostics:</strong>
        <div id="debugContent"></div>
      </div>
    </div>

    <script>
      // GLOBAL ERROR CATCHER FOR MOBILE
      window.onerror = function (msg, url, line, col, error) {
        var errMsg = "JS ERROR: " + msg + "\nLine: " + line;
        alert(errMsg);
        if (typeof log === "function") log(errMsg, "err");
        return false;
      };

      var db;
      var DB_NAME = "OfflineFormDB";
      var DB_STORE = "entries";

      var FIELD_ORDER = [
        "name",
        "number",
        "email",
        "ageGroup",
        "source",
        "pinCode",
        "feedback",
        "time",
      ];

      var FIELD_LABELS = {
        name: "Name",
        number: "Phone Number",
        email: "Email",
        ageGroup: "Age Group",
        source: "Source",
        pinCode: "Pin Code",
        feedback: "Feedback",
        time: "Time",
      };

      // Load saved server URL
      var savedUrl = (function () {
        try {
          return localStorage.getItem("offline_form_server_url");
        } catch (e) {
          console.warn("localStorage blocked");
          return null;
        }
      })();
      if (savedUrl) document.getElementById("serverUrl").value = savedUrl;

      function getServerUrl() {
        var url = document.getElementById("serverUrl").value.trim();
        try {
          localStorage.setItem("offline_form_server_url", url);
        } catch (e) {}
        return url.lastIndexOf("/") === url.length - 1 ? url.slice(0, -1) : url;
      }

      function log(msg, type) {
        var panel = document.getElementById("debugPanel");
        var content = document.getElementById("debugContent");
        var time = new Date().toLocaleTimeString();
        var style =
          type === "err"
            ? "color:#ff5555"
            : type === "warn"
              ? "color:#ffcc00"
              : "";
        content.innerHTML =
          '<span style="' +
          style +
          '">[' +
          time +
          "] " +
          msg +
          "</span><br>" +
          content.innerHTML;
        console.log("[FORM DEBUG] " + msg);
      }

      // INITIALIZE DATABASE
      log("Initializing Database...");
      log("Protocol: " + window.location.protocol);
      if (window.location.protocol.indexOf("content") !== -1) {
        log(
          "Warning: Opened via 'content://' URI. This may block IndexedDB on Android Chrome.",
          "warn",
        );
      }

      if (!window.indexedDB) {
        log("CRITICAL: IndexedDB NOT supported by this browser!", "err");
        alert(
          "Your browser does not support offline saving. Please use Chrome or Safari.",
        );
      }

      var request = indexedDB.open(DB_NAME, 2);

      request.onblocked = function () {
        log("DB Blocked: Please close other tabs of this page!", "warn");
        alert(
          "Database is blocked. Please close other open tabs of this form.",
        );
      };

      request.onerror = function (event) {
        var err = event.target.error
          ? event.target.error.name
          : "Unknown Error";
        log("IndexedDB Opening Error: " + err, "err");

        if (err === "SecurityError") {
          alert(
            "CRITICAL: Privacy settings or 'Incognito' mode are blocking the database. Please open in a normal tab.",
          );
        } else {
          alert(
            "Database Error: " +
              err +
              ". If on mobile, don't open from WhatsApp; save to 'Downloads' and open in Chrome directly.",
          );
        }
      };

      request.onupgradeneeded = function (event) {
        log(
          "Database upgrade/init started (v" + event.oldVersion + " -> v2)...",
        );
        db = event.target.result;
        var oldVersion = event.oldVersion;
        var store;

        try {
          if (oldVersion < 1) {
            store = db.createObjectStore(DB_STORE, {
              keyPath: "id",
              autoIncrement: true,
            });
            log("Object store 'entries' created.");
          } else {
            store = event.target.transaction.objectStore(DB_STORE);
            log("Existing object store found.");
          }

          if (!store.indexNames.contains("synced")) {
            store.createIndex("synced", "synced", { unique: false });
            log("Index 'synced' created.");
          }
        } catch (e) {
          log("Upgrade failed: " + e.message, "err");
        }
      };

      request.onsuccess = function (event) {
        db = event.target.result;
        log("Database ready!");

        db.onversionchange = function () {
          db.close();
          log(
            "Database version changed elsewhere. Closing this connection.",
            "warn",
          );
        };

        if (navigator.onLine) {
          log("System online, checking for pending syncs...");
          syncToServer();
        }
      };

      document
        .getElementById("myForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          if (!db) {
            var msg =
              window.location.protocol.indexOf("content") !== -1
                ? "Database not ready. YOU ARE OPENING THIS WRONG. Please save the file to your phone first, then open it directly in Chrome."
                : "Database not ready yet. If this persists, your browser may be blocking local storage (Privacy/Incognito mode).";
            alert(msg);
            log("Submit denied: db is null", "err");
            return;
          }

          var btn = document.getElementById("submitBtn");
          var btnText = btn.querySelector("span");

          // Show loading state
          btn.disabled = true;
          btnText.innerHTML = 'Saving... <div class="loader"></div>';

          var entry = {
            name: document.getElementById("name").value.trim(),
            number: document.getElementById("number").value.trim(),
            email: document.getElementById("email").value.trim(),
            ageGroup: getCheckedValue("ageGroup"),
            source: getCheckedValue("source"),
            pinCode: document.getElementById("pinCode").value.trim(),
            feedback: document.getElementById("feedback").value.trim(),
            time: new Date().toISOString(),
            synced: 0,
          };

          var tx = db.transaction([DB_STORE], "readwrite");
          var store = tx.objectStore(DB_STORE);

          tx.onerror = function (e) {
            log("Transaction Error: " + e.target.error);
            alert("Storage full or blocked!");
            finishSubmit();
          };

          var addReq = store.add(entry);

          addReq.onsuccess = function (e) {
            var id = e.target.result;
            entry.id = id;
            log("Saved locally to ID: " + id);

            // Reset Form
            document.getElementById("myForm").reset();

            // Proactive Sync
            if (navigator.onLine) {
              log("Online detected. Syncing...");
              sendEntry(entry)
                .then(function () {
                  log("Sync successful!");
                  finishSubmit();
                })
                .catch(function (err) {
                  log("Sync failed: " + err.message);
                  finishSubmit();
                });
            } else {
              log("Offline mode. Stored locally.");
              alert("Saved Offline!");
              finishSubmit();
            }
          };

          addReq.onerror = function (e) {
            log("Add Request Error: " + e.target.error);
            alert("Could not save. Check browser settings.");
            finishSubmit();
          };

          function finishSubmit() {
            btn.disabled = false;
            btnText.innerHTML = "Save Offline";
            showLocalEntries();
          }
        });

      document
        .getElementById("showBtn")
        .addEventListener("click", showLocalEntries);

      function showLocalEntries() {
        if (!db) return;
        var entriesDiv = document.getElementById("entries");
        entriesDiv.innerHTML = "<h3>Local Entries (This Device)</h3>";

        var tx = db.transaction([DB_STORE], "readonly");
        var store = tx.objectStore(DB_STORE);

        store.openCursor(null, "prev").onsuccess = function (event) {
          var cursor = event.target.result;
          if (cursor) {
            entriesDiv.innerHTML += renderEntry(cursor.value);
            cursor.continue();
          }
        };
      }

      document
        .getElementById("fetchBtn")
        .addEventListener("click", function () {
          var entriesDiv = document.getElementById("entries");
          var fetchBtn = document.getElementById("fetchBtn");
          fetchBtn.disabled = true;
          fetchBtn.innerText = "Fetching...";

          fetch(getServerUrl() + "/entries")
            .then(function (res) {
              return res.json();
            })
            .then(function (data) {
              entriesDiv.innerHTML = "<h3>Server Entries (Global)</h3>";
              if (!data || data.length === 0)
                entriesDiv.innerHTML += "<p>No entries found on server.</p>";
              data.forEach(function (item) {
                entriesDiv.innerHTML += renderEntry({
                  id: item.id,
                  name: item.name,
                  number: item.number,
                  email: item.email,
                  ageGroup: item.age_group,
                  source: item.source,
                  pinCode: item.pin_code,
                  feedback: item.feedback,
                  time: item.submitted_at || item.created_at,
                  remote: true,
                });
              });
            })
            .catch(function (err) {
              alert("Error fetching from server. Check URL or connection.");
              log("Fetch error: " + err.message);
            })
            .then(function () {
              fetchBtn.disabled = false;
              fetchBtn.innerText = "Fetch from Server";
            });
        });

      document.getElementById("copyBtn").addEventListener("click", function () {
        exportAllData().then(function (data) {
          if (!data || data.length === 0) {
            alert("No data to copy");
            return;
          }
          var text = JSON.stringify(data, null, 2);
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard
              .writeText(text)
              .then(function () {
                alert("All entries copied to clipboard!");
              })
              .catch(function (err) {
                fallbackCopy(text);
              });
          } else {
            fallbackCopy(text);
          }
        });
      });

      function fallbackCopy(text) {
        var textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand("copy");
          alert("All entries copied to clipboard!");
        } catch (e) {
          log("Copy failed: " + e.message);
          alert("Copy failed. See logs.");
        }
        document.body.removeChild(textarea);
      }

      document.getElementById("testBtn").addEventListener("click", function () {
        var btn = document.getElementById("testBtn");
        btn.disabled = true;
        btn.innerText = "Testing...";
        log("Testing connection to " + getServerUrl() + "/...");

        fetch(getServerUrl() + "/", {
          mode: "no-cors",
        })
          .then(function () {
            log("Server is reachable!");
            alert("Success! Your phone can talk to the server.");
          })
          .catch(function (err) {
            log("Connection failed: " + err.message);
            alert("Failed! Cannot reach server.");
          })
          .then(function () {
            btn.disabled = false;
            btn.innerText = "Test Connection";
          });
      });

      document
        .getElementById("debugBtn")
        .addEventListener("click", function () {
          var panel = document.getElementById("debugPanel");
          panel.style.display =
            panel.style.display === "block" ? "none" : "block";
        });

      document
        .getElementById("exportJsonBtn")
        .addEventListener("click", function () {
          exportAllData().then(function (data) {
            var blob = new Blob([JSON.stringify(data, null, 2)], {
              type: "application/json",
            });
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = "offline-data.json";
            a.click();
          });
        });

      document
        .getElementById("exportCsvBtn")
        .addEventListener("click", function () {
          exportAllData().then(function (data) {
            if (!data || data.length === 0) {
              alert("No data found");
              return;
            }
            var header =
              FIELD_ORDER.map(function (k) {
                return '"' + FIELD_LABELS[k] + '"';
              }).join(",") + "\n";
            var rows = data
              .map(function (obj) {
                return FIELD_ORDER.map(function (k) {
                  return '"' + String(obj[k] || "").replace(/"/g, '""') + '"';
                }).join(",");
              })
              .join("\n");
            var blob = new Blob([header + rows], { type: "text/csv" });
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = "offline-data.csv";
            a.click();
          });
        });

      function exportAllData() {
        return new Promise(function (resolve) {
          if (!db) {
            resolve([]);
            return;
          }
          var tx = db.transaction([DB_STORE], "readonly");
          var store = tx.objectStore(DB_STORE);
          var all = [];
          store.openCursor().onsuccess = function (e) {
            var cursor = e.target.result;
            if (cursor) {
              all.push(cursor.value);
              cursor.continue();
            } else resolve(all);
          };
        });
      }

      function getCheckedValue(name) {
        var node = document.querySelector('input[name="' + name + '"]:checked');
        return node ? node.value : "";
      }

      window.addEventListener("online", function () {
        log("Connection restored. Syncing...");
        syncToServer();
      });

      function syncToServer() {
        if (!db) return;
        var tx = db.transaction([DB_STORE], "readonly");
        var store = tx.objectStore(DB_STORE);
        var index = store.index("synced");
        var pending = [];
        var range = IDBKeyRange.only(0);

        try {
          index.openCursor(range).onsuccess = function (e) {
            var cursor = e.target.result;
            if (cursor) {
              pending.push(cursor.value);
              cursor.continue();
            } else {
              for (var i = 0; i < pending.length; i++) {
                sendEntry(pending[i]);
              }
            }
          };
        } catch (err) {
          log("Cursor error: " + err.message);
          // Fallback: search all
          store.openCursor().onsuccess = function (e) {
            var cursor = e.target.result;
            if (cursor) {
              if (cursor.value.synced === 0 || cursor.value.synced === false) {
                sendEntry(cursor.value);
              }
              cursor.continue();
            }
          };
        }
      }

      function sendEntry(entry) {
        return fetch(getServerUrl() + "/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(entry),
        })
          .then(function (res) {
            if (res.ok) markSynced(entry.id);
            return res;
          })
          .catch(function (err) {
            console.warn("Sync failed", err);
            throw err;
          });
      }

      function markSynced(id) {
        var tx = db.transaction([DB_STORE], "readwrite");
        var store = tx.objectStore(DB_STORE);
        var req = store.get(id);
        req.onsuccess = function () {
          var record = req.result;
          if (record) {
            record.synced = 1;
            store.put(record);
          }
        };
      }

      function renderEntry(entry) {
        var badge = "";
        if (entry.remote) {
          badge = '<span class="sync-badge remote">Cloud</span>';
        } else {
          badge =
            entry.synced === 1 || entry.synced === true
              ? '<span class="sync-badge synced">Synced</span>'
              : '<span class="sync-badge pending">Pending</span>';
        }

        return (
          '<div class="entry">' +
          badge +
          "<strong>" +
          entry.name +
          "</strong><br>" +
          "<small>" +
          entry.number +
          " | " +
          entry.email +
          "</small><br>" +
          '<div style="font-size: 13px; margin-top: 5px;">' +
          "<b>Age:</b> " +
          entry.ageGroup +
          " | <b>Source:</b> " +
          entry.source +
          " | <b>Pin:</b> " +
          entry.pinCode +
          "</div>" +
          (entry.feedback
            ? '<div style="font-size: 13px; font-style: italic; color: #666; margin-top: 4px;">"' +
              entry.feedback +
              '"</div>'
            : "") +
          '<div class="meta">' +
          new Date(entry.time).toLocaleString() +
          "</div>" +
          "</div>"
        );
      }
    </script>
  </body>
</html>
