<!doctype html>
<html>
  <head>
    <title>Bareilly Kitab Utsav - Offline Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      :root {
        --purple: #673ab7;
        --accent: #f1edff;
        --border: #dcdcdc;
        --text: #202124;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        color: var(--text);
        line-height: 1.5;
      }
      .page {
        max-width: 720px;
        margin: 24px auto 60px;
        padding: 0 18px;
      }
      .form-card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        margin-bottom: 16px;
        overflow: hidden;
      }
      .form-header {
        border-top: 8px solid var(--purple);
        padding: 20px;
      }
      .form-header h1 {
        margin: 0 0 4px;
        font-size: 24px;
      }
      .form-header .sub {
        margin: 0 0 8px;
        color: #5f6368;
        font-size: 14px;
      }
      form {
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .question {
        border-top: 1px solid var(--border);
        padding: 18px 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .question:first-of-type {
        border-top: none;
      }
      input[type="text"],
      input[type="tel"],
      input[type="email"],
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 14px;
      }
      .options label {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--accent);
      }
      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 8px;
      }
      button.primary {
        background: var(--purple);
        color: #fff;
        border: 1px solid var(--purple);
        padding: 12px;
        font-size: 16px;
        border-radius: 6px;
        margin-top: 10px;
      }
      #entries .entry {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px 16px;
        margin-bottom: 10px;
      }
      #entries .meta {
        color: #5f6368;
        font-size: 12px;
        margin-top: 6px;
      }
      .buttons {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="form-card">
        <div class="form-header">
          <h1>Patna kitab utsav</h1>
          <p class="sub">April 03-07, 2026</p>
        </div>

        <form id="myForm">
          <!-- NAME -->
          <div class="question">
            <label for="name">Name</label>
            <input type="text" id="name" required />
          </div>

          <!-- NUMBER -->
          <div class="question">
            <label for="number">Number</label>
            <input type="tel" id="number" required />
          </div>

          <!-- EMAIL -->
          <div class="question">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>

          <!-- AGE GROUP -->
          <div class="question">
            <p class="q-label">Age Group</p>
            <div class="options">
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="0-10"
                  required
                />0-10</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="11-15"
                />11-15</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="16-18"
                />16-18</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="19-22"
                />19-22</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="23-25"
                />23-25</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="26-28"
                />26-28</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="29-31"
                />29-31</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="32-35"
                />32-35</label
              >
              <label
                ><input
                  type="radio"
                  name="ageGroup"
                  value="35-40"
                />35-40</label
              >
              <label
                ><input type="radio" name="ageGroup" value="40+" />40+</label
              >
            </div>
          </div>

          <!-- SOURCE -->
          <div class="question">
            <p class="q-label">From where you know about the event?</p>
            <div class="options">
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Invitation Card"
                  required
                />Invitation Card</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Poster"
                />Poster</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Instagram"
                />Instagram</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Facebook"
                />Facebook</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Friends/Family"
                />Friends/Family</label
              >
              <label
                ><input
                  type="radio"
                  name="source"
                  value="Newspaper"
                />Newspaper</label
              >
              <label
                ><input type="radio" name="source" value="Other" />Other</label
              >
            </div>
          </div>

          <!-- PIN CODE -->
          <div class="question">
            <label for="pinCode">Location Pin Code</label>
            <input
              type="text"
              id="pinCode"
              placeholder="e.g. 243001 or Area Name"
              required
            />
          </div>

          <!-- FEEDBACK -->
          <div class="question">
            <label for="feedback">Suggestion / Feedback</label>
            <textarea id="feedback"></textarea>
          </div>

          <button class="primary" type="submit">Save Offline</button>
        </form>
      </div>

      <div class="buttons">
        <button id="showBtn">Show All Entries</button>
        <button id="exportJsonBtn">Export JSON</button>
        <button id="exportCsvBtn">Export CSV</button>
      </div>

      <div id="entries"></div>
    </div>

    <script>
      let db;
      const DB_NAME = "OfflineFormDB";
      const DB_STORE = "entries";

      const FIELD_ORDER = [
        "name",
        "number",
        "email",
        "ageGroup",
        "source",
        "pinCode",
        "feedback",
        "time",
      ];

      const FIELD_LABELS = {
        name: "Name",
        number: "Phone Number",
        email: "Email",
        ageGroup: "Age Group",
        source: "Source",
        pinCode: "Pin Code",
        feedback: "Feedback",
        time: "Saved At",
      };

      const request = indexedDB.open(DB_NAME, 1);

      request.onupgradeneeded = function (event) {
        db = event.target.result;
        db.createObjectStore(DB_STORE, { keyPath: "id", autoIncrement: true });
      };

      request.onsuccess = function (event) {
        db = event.target.result;
      };

      document
        .getElementById("myForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const entry = {
            name: document.getElementById("name").value.trim(),
            number: document.getElementById("number").value.trim(),
            email: document.getElementById("email").value.trim(),
            ageGroup: getCheckedValue("ageGroup"),
            source: getCheckedValue("source"),
            pinCode: document.getElementById("pinCode").value.trim(),
            feedback: document.getElementById("feedback").value.trim(),
            time: new Date().toISOString(),
          };

          const tx = db.transaction([DB_STORE], "readwrite");
          tx.objectStore(DB_STORE).add(entry);

          tx.oncomplete = () => {
            alert("Saved Offline Successfully!");
            document.getElementById("myForm").reset();
          };
        });

      document.getElementById("showBtn").addEventListener("click", function () {
        const entriesDiv = document.getElementById("entries");
        entriesDiv.innerHTML = "";

        const tx = db.transaction([DB_STORE], "readonly");
        const store = tx.objectStore(DB_STORE);

        store.openCursor().onsuccess = function (event) {
          const cursor = event.target.result;
          if (cursor) {
            entriesDiv.innerHTML += renderEntry(cursor.value);
            cursor.continue();
          }
        };
      });

      document
        .getElementById("exportJsonBtn")
        .addEventListener("click", function () {
          exportAllData().then((data) => {
            const blob = new Blob([JSON.stringify(data, null, 2)], {
              type: "application/json",
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "offline-data.json";
            a.click();
          });
        });

      document
        .getElementById("exportCsvBtn")
        .addEventListener("click", function () {
          exportAllData().then((data) => {
            if (data.length === 0) {
              alert("No data found");
              return;
            }

            const header =
              FIELD_ORDER.map((k) => `"${FIELD_LABELS[k]}"`).join(",") + "\n";

            const rows = data
              .map((obj) =>
                FIELD_ORDER.map(
                  (k) => `"${String(obj[k] || "").replace(/"/g, '""')}"`,
                ).join(","),
              )
              .join("\n");

            const blob = new Blob([header + rows], { type: "text/csv" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "offline-data.csv";
            a.click();
          });
        });

      function exportAllData() {
        return new Promise((resolve) => {
          const tx = db.transaction([DB_STORE], "readonly");
          const store = tx.objectStore(DB_STORE);
          const all = [];

          store.openCursor().onsuccess = function (e) {
            const cursor = e.target.result;
            if (cursor) {
              all.push(cursor.value);
              cursor.continue();
            } else resolve(all);
          };
        });
      }

      function getCheckedValue(name) {
        const node = document.querySelector(`input[name="${name}"]:checked`);
        return node ? node.value : "";
      }

      function renderEntry(entry) {
        return `
        <div class="entry">
          <strong>${entry.name}</strong><br>
          ${FIELD_LABELS.number}: ${entry.number}<br>
          ${FIELD_LABELS.email}: ${entry.email}<br>
          ${FIELD_LABELS.ageGroup}: ${entry.ageGroup}<br>
          ${FIELD_LABELS.source}: ${entry.source}<br>
          ${FIELD_LABELS.pinCode}: ${entry.pinCode}<br>
          ${FIELD_LABELS.feedback}: ${entry.feedback}<br>
          <div class="meta">${new Date(entry.time).toLocaleString()}</div>
        </div>`;
      }
    </script>
  </body>
</html>
